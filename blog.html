<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Blogs | Swetha R</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(120deg,#fdf2f8,#f0f9ff,#ecfeff);
color:#334155;
overflow-x:hidden;
}

/* world map background */

.world-map{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
opacity:0.15;
z-index:-2;
background-image:url("https://upload.wikimedia.org/wikipedia/commons/8/80/World_map_-_low_resolution.svg");
background-size:cover;
background-position:center;
}

/* network animation */

#network-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

/* heading */

.blog-title{
text-align:center;
font-size:42px;
margin-top:60px;
margin-bottom:40px;

background:linear-gradient(90deg,#ec4899,#6366f1,#0ea5e9);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* blog cards */

.blog-container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:30px;
max-width:1100px;
margin:auto;
padding:40px;
}

.blog-card{
background:rgba(255,255,255,0.75);
padding:25px;
border-radius:16px;
text-decoration:none;
color:#334155;
border:1px solid rgba(0,0,0,0.05);
transition:0.3s;
}

.blog-card:hover{
transform:translateY(-8px);
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.blog-card h2{
color:#6366f1;
margin-top:0;
}

</style>

</head>

<body>

<div class="world-map"></div>

<canvas id="network-bg"></canvas>

<h1 class="blog-title">Network Insights & Personal Blogs</h1>

<div class="blog-container">

<a href="./my-journey.html" class="blog-card">
<h2>My Journey in Networking</h2>
<p>A personal introduction about my networking career and experiences.</p>
</a>

</div>

<script>

const canvas = document.getElementById("network-bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

/* Global node locations */

const nodes = [
{x:200,y:200},   // North America
{x:400,y:300},   // South America
{x:700,y:200},   // Europe
{x:900,y:350},   // Africa
{x:1100,y:200},  // Asia
{x:1300,y:320},  // Australia
];

/* connections */

const routes = [
[0,2],
[2,4],
[4,5],
[0,1],
[2,3],
[3,4]
];

let packets=[];

routes.forEach((r,i)=>{
packets.push({route:i,progress:Math.random()});
});

/* draw curved connection */

function drawCurve(x1,y1,x2,y2){

let cx=(x1+x2)/2;
let cy=(y1+y2)/2-80;

ctx.beginPath();
ctx.moveTo(x1,y1);
ctx.quadraticCurveTo(cx,cy,x2,y2);
ctx.strokeStyle="rgba(99,102,241,0.25)";
ctx.lineWidth=2;
ctx.stroke();

return {cx,cy};

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

/* draw nodes */

nodes.forEach(n=>{
ctx.beginPath();
ctx.arc(n.x,n.y,4,0,Math.PI*2);
ctx.fillStyle="#a5b4fc";
ctx.fill();
});

/* draw routes */

routes.forEach(r=>{
drawCurve(
nodes[r[0]].x,
nodes[r[0]].y,
nodes[r[1]].x,
nodes[r[1]].y
);
});

/* animate packets */

packets.forEach(p=>{

let r=routes[p.route];

let start=nodes[r[0]];
let end=nodes[r[1]];

p.progress+=0.006;

if(p.progress>1)p.progress=0;

let x=start.x+(end.x-start.x)*p.progress;
let y=start.y+(end.y-start.y)*p.progress-80*Math.sin(Math.PI*p.progress);

ctx.beginPath();
ctx.arc(x,y,3,0,Math.PI*2);
ctx.fillStyle="#f472b6";
ctx.fill();

});

requestAnimationFrame(animate);

}

animate();

</script>

</body>
</html>
